# ============================================
# WordPress 全自動リライトツール
# docker compose up -d で起動
# ============================================

services:
  app:
    build: .
    container_name: wp-rewriter
    restart: unless-stopped
    ports:
      - "${PORT:-3002}:3002"
    env_file:
      - .env
    volumes:
      # データ永続化（記事キャッシュ・サイト設定・履歴）
      - ./data:/app/data
      # ログ永続化
      - ./logs:/app/logs
      # カスタムプロンプト（任意）
      - ./prompts:/app/prompts
    environment:
      - NODE_ENV=production
      - PORT=3002
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3002/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
